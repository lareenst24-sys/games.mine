<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Private Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
            padding: 50px;
        }
        .box {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        input {
            padding: 10px;
            width: 80%;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Private Access</h2>
        <p>Enter password to continue</p>
        <input type="password" id="password" placeholder="Enter password">
        <br>
        <button onclick="checkPassword()">Enter</button>
        <p id="message"></p>
    </div>

    <script>
        function checkPassword() {
            const correctPassword = "1234"; // change this
            const userPassword = document.getElementById("password").value;

            if (userPassword === correctPassword) {
                document.body.innerHTML = "<h1>Welcome 🔓</h1><p>This is your private page.</p>";
            } else {
                document.getElementById("message").innerText = "Wrong password ❌";
            }
        }
    </script>

</body>
</html>
